global:
  imageRegistry: "ghcr.io/omattsson"
  imagePullSecrets: []
  appArmor:
    enabled: false  # Set to true for environments with AppArmor support (e.g. most Linux distributions)

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Argo Rollouts (progressive delivery)
# ---------------------------------------------------------------------------
argoRollouts:
  enabled: false  # Set to false to use standard Kubernetes Deployments
  # NOTE: Canary weight-based traffic splitting requires ingress.type=traefik.
  # With other ingress types, rollouts still pause between steps but traffic
  # is pod-level (round-robin), not percentage-weighted.

# ---------------------------------------------------------------------------
# Backend
# ---------------------------------------------------------------------------
backend:
  image:
    repository: k8s-stack-manager/backend
    tag: ""  # Empty = uses Chart.AppVersion
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8081

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: "1"

  # Non-secret environment variables (stored in ConfigMap).
  env:
    APP_NAME: k8s-stack-manager
    GO_ENV: production
    APP_DEBUG: "false"
    SERVER_HOST: "0.0.0.0"
    SERVER_PORT: "8081"
    SERVER_READ_TIMEOUT: "10s"
    SERVER_WRITE_TIMEOUT: "0"
    SERVER_IDLE_TIMEOUT: "30s"
    SERVER_SHUTDOWN_TIMEOUT: "30s"
    LOG_LEVEL: info
    API_VERSION: v1
    API_PREFIX: /api
    RATE_LIMIT: "2000"
    LOGIN_RATE_LIMIT: "500"
    CORS_ALLOWED_ORIGINS: "*"
    CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
    CORS_ALLOWED_HEADERS: "Origin,Content-Type,Accept,Authorization"
    CORS_MAX_AGE: "300"
    SELF_REGISTRATION: "true"
    DEFAULT_BRANCH: master
    HELM_BINARY: helm
    DEPLOYMENT_TIMEOUT: "10m"
    MAX_CONCURRENT_DEPLOYS: "5"
    # Wildcard TLS secret replication — copies a shared TLS secret into every
    # stack namespace so ingresses can reference it. Disabled when
    # WILDCARD_TLS_SOURCE_SECRET is empty. Set to enable for local dev flows
    # where a single pre-existing cert is reused across all stacks.
    WILDCARD_TLS_SOURCE_NAMESPACE: ""
    WILDCARD_TLS_SOURCE_SECRET: ""
    WILDCARD_TLS_TARGET_SECRET: ""
    # ---- Extension hooks (see EXTENDING.md) ----
    # Hooks are configured via the top-level `hooks` section below.
    # When hooks.enabled is true, a ConfigMap and volume mount are
    # created automatically — no manual HOOKS_CONFIG_FILE needed.
    JWT_EXPIRATION: "24h"
    ADMIN_USERNAME: admin
    # OIDC (disabled by default)
    OIDC_ENABLED: "false"
    OIDC_SCOPES: "openid,profile,email"
    OIDC_ROLE_CLAIM: roles
    OIDC_AUTO_PROVISION: "true"
    OIDC_LOCAL_AUTH: "true"
    OIDC_STATE_TTL: "5m"
    SESSION_STORE: "mysql"
    ENABLE_SWAGGER: "false"

  # Secret environment variables (stored in Secret).
  secrets:
    JWT_SECRET: "CHANGE-ME-generate-a-random-secret"               # MUST be provided — minimum 16 chars
    ADMIN_PASSWORD: "CHANGE-ME-set-a-secure-password"
    KUBECONFIG_ENCRYPTION_KEY: ""
    # Git providers (optional)
    AZURE_DEVOPS_PAT: ""
    GITLAB_TOKEN: ""
    # OIDC secrets (optional)
    OIDC_CLIENT_SECRET: ""

  rollout:
    strategy:
      canary:
        steps:
          - setWeight: 20
          - pause:
              duration: 30s
          - setWeight: 50
          - pause:
              duration: 30s
          - setWeight: 80
          - pause:
              duration: 30s
    analysis:
      enabled: false
      interval: 30s
      count: 5
      failureLimit: 2

  pdb:
    enabled: true
    maxUnavailable: 1
    # minAvailable: 1  # Alternative — use one or the other

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80

  serviceAccount:
    create: true
    annotations: {}

# ---------------------------------------------------------------------------
# Frontend
# ---------------------------------------------------------------------------
frontend:
  # Set to false for headless / API-only deployments — skips all frontend resources
  # (Deployment/Rollout, Service, ConfigMap, HPA, PDB, ServiceAccount) and the
  # ingress rule routing `/` to the frontend. The backend (/api, /ws, /health,
  # /swagger) is unaffected.
  enabled: true
  image:
    repository: k8s-stack-manager/frontend
    tag: ""  # Empty = uses Chart.AppVersion
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8080

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

  rollout:
    strategy:
      canary:
        steps:
          - setWeight: 20
          - pause:
              duration: 30s
          - setWeight: 50
          - pause:
              duration: 30s
          - setWeight: 80
          - pause:
              duration: 30s
    analysis:
      enabled: false
      interval: 30s
      count: 5
      failureLimit: 2

  pdb:
    enabled: true
    maxUnavailable: 1
    # minAvailable: 1  # Alternative — use one or the other

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80

  serviceAccount:
    create: true
    annotations: {}

# ---------------------------------------------------------------------------
# MySQL Database
# ---------------------------------------------------------------------------
mysql:
  enabled: true
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  auth:
    rootPassword: "CHANGE-ME-set-a-secure-password"
    database: app          # Database name to create
    user: ""               # Optional: create a non-root user
    password: ""           # Optional: password for non-root user
  persistence:
    enabled: true     # Set false for local dev (uses emptyDir, data lost on pod restart)
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m
  config: |
    [mysqld]
    max_connections=100
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci

# ---------------------------------------------------------------------------
# OpenTelemetry Collector
# ---------------------------------------------------------------------------
otel:
  enabled: false
  sampleRate: "1.0"   # Trace sampling rate (0.0-1.0). Reduce for production.
  collector:
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.120.0"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# ---------------------------------------------------------------------------
# Extension Hooks (see EXTENDING.md)
# ---------------------------------------------------------------------------
# Lifecycle subscriptions (pre-deploy, deploy-finalized, etc.) and named
# actions (redis-sync, db-refresh, etc.) invoked via the generic
# POST /api/v1/stack-instances/:id/actions/:name route.
hooks:
  enabled: false
  subscriptions: []
  # - name: teams-notifier
  #   events: ["deploy-finalized"]
  #   url: "http://teams-notifier.extensions.svc.cluster.local:8080/hook"
  #   timeout_seconds: 10
  #   failure_policy: ignore
  #   secret_env: TEAMS_NOTIFIER_HOOK_SECRET
  # - name: ci-trigger-gate
  #   events: ["pre-deploy"]
  #   url: "http://ci-trigger-gate.extensions.svc.cluster.local:8080/hook"
  #   timeout_seconds: 600
  #   failure_policy: fail
  #   secret_env: CI_TRIGGER_WEBHOOK_SECRET
  actions: []
  # - name: redis-sync
  #   url: "http://redis-sync.extensions.svc.cluster.local:8080/action"
  #   description: "Flush and reseed Redis cache"
  #   timeout_seconds: 120
  #   secret_env: REDIS_SYNC_HOOK_SECRET

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  # type: traefik | ingress | none
  #   traefik  — Traefik IngressRoute CRD (requires Traefik with CRDs installed)
  #   ingress  — Standard Kubernetes Ingress (works with any ingress controller)
  #   none     — No ingress; use kubectl port-forward to access services
  type: traefik

  host: ""  # Empty = match all hosts (good for local dev)

  # Traefik-specific settings (only used when type: traefik)
  traefik:
    entryPoints:
      - web
    tls: {}
    #  secretName: k8s-stack-manager-tls
    middlewares:
      stripApiPrefix: false  # Backend routes include /api prefix (/api/v1/...)
      secureHeaders: true

  # Standard Ingress settings (only used when type: ingress)
  className: ""  # e.g. "nginx", "traefik", or leave empty for cluster default
  tls: []
  #  - secretName: k8s-stack-manager-tls
  #    hosts:
  #      - k8s-stack-manager.local
  annotations: {}
  #  nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  #  nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

# ---------------------------------------------------------------------------
# Prometheus Metrics
# ---------------------------------------------------------------------------
metrics:
  enabled: false
  port: 9090
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
