global:
  imageRegistry: "ghcr.io/omattsson"
  appArmor:
    enabled: false  # Set to true for environments with AppArmor support (e.g. most Linux distributions)

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Argo Rollouts (progressive delivery)
# ---------------------------------------------------------------------------
argoRollouts:
  enabled: false  # Set to false to use standard Kubernetes Deployments
  # NOTE: Canary weight-based traffic splitting requires ingress.type=traefik.
  # With other ingress types, rollouts still pause between steps but traffic
  # is pod-level (round-robin), not percentage-weighted.

# ---------------------------------------------------------------------------
# Backend
# ---------------------------------------------------------------------------
backend:
  image:
    repository: k8s-stack-manager/backend
    tag: ""  # Empty = uses Chart.AppVersion
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8081

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: "1"

  # Non-secret environment variables (stored in ConfigMap).
  env:
    APP_NAME: k8s-stack-manager
    GO_ENV: production
    APP_DEBUG: "false"
    SERVER_HOST: "0.0.0.0"
    SERVER_PORT: "8081"
    SERVER_READ_TIMEOUT: "10s"
    SERVER_WRITE_TIMEOUT: "0"
    SERVER_IDLE_TIMEOUT: "30s"
    SERVER_SHUTDOWN_TIMEOUT: "30s"
    LOG_LEVEL: info
    API_VERSION: v1
    API_PREFIX: /api
    RATE_LIMIT: "2000"
    LOGIN_RATE_LIMIT: "500"
    CORS_ALLOWED_ORIGINS: "*"
    CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
    CORS_ALLOWED_HEADERS: "Origin,Content-Type,Accept,Authorization"
    CORS_MAX_AGE: "300"
    USE_AZURE_TABLE: "false"
    USE_AZURITE: "false"
    # AZURE_TABLE_ENDPOINT is auto-set to the azurite service when azurite.enabled=true
    AZURE_TABLE_ACCOUNT_NAME: devstoreaccount1
    AZURE_TABLE_NAME: items
    SELF_REGISTRATION: "true"
    DEFAULT_BRANCH: master
    HELM_BINARY: helm
    DEPLOYMENT_TIMEOUT: "10m"
    MAX_CONCURRENT_DEPLOYS: "5"
    JWT_EXPIRATION: "24h"
    ADMIN_USERNAME: admin
    # OIDC (disabled by default)
    OIDC_ENABLED: "false"
    OIDC_SCOPES: "openid,profile,email"
    OIDC_ROLE_CLAIM: roles
    OIDC_AUTO_PROVISION: "true"
    OIDC_LOCAL_AUTH: "true"
    OIDC_STATE_TTL: "5m"
    ENABLE_SWAGGER: "false"

  # Secret environment variables (stored in Secret).
  secrets:
    JWT_SECRET: "CHANGE-ME-generate-a-random-secret"               # MUST be provided — minimum 16 chars
    ADMIN_PASSWORD: "CHANGE-ME-set-a-secure-password"
    AZURE_TABLE_ACCOUNT_KEY: "Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw=="
    KUBECONFIG_ENCRYPTION_KEY: ""
    # Git providers (optional)
    AZURE_DEVOPS_PAT: ""
    GITLAB_TOKEN: ""
    # OIDC secrets (optional)
    OIDC_CLIENT_SECRET: ""

  rollout:
    strategy:
      canary:
        steps:
          - setWeight: 20
          - pause:
              duration: 30s
          - setWeight: 50
          - pause:
              duration: 30s
          - setWeight: 80
          - pause:
              duration: 30s
    analysis:
      enabled: false
      interval: 30s
      count: 5
      failureLimit: 2

  pdb:
    enabled: true
    maxUnavailable: 1
    # minAvailable: 1  # Alternative — use one or the other

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80

  serviceAccount:
    create: true
    annotations: {}

# ---------------------------------------------------------------------------
# Frontend
# ---------------------------------------------------------------------------
frontend:
  image:
    repository: k8s-stack-manager/frontend
    tag: ""  # Empty = uses Chart.AppVersion
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8080

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

  rollout:
    strategy:
      canary:
        steps:
          - setWeight: 20
          - pause:
              duration: 30s
          - setWeight: 50
          - pause:
              duration: 30s
          - setWeight: 80
          - pause:
              duration: 30s
    analysis:
      enabled: false
      interval: 30s
      count: 5
      failureLimit: 2

  pdb:
    enabled: true
    maxUnavailable: 1
    # minAvailable: 1  # Alternative — use one or the other

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80

  serviceAccount:
    create: true
    annotations: {}

# ---------------------------------------------------------------------------
# Azurite (Azure Table Storage emulator)
# ---------------------------------------------------------------------------
azurite:
  enabled: false  # Enable for Azure Table Storage emulator; set backend.env.USE_AZURE_TABLE to "true"
  image:
    repository: mcr.microsoft.com/azure-storage/azurite
    tag: "3.34.0"
    pullPolicy: IfNotPresent
  persistence:
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

# ---------------------------------------------------------------------------
# MySQL Database
# ---------------------------------------------------------------------------
mysql:
  enabled: true  # Disable to use Azure Table Storage instead; set backend.env.USE_AZURE_TABLE to "true"
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  auth:
    rootPassword: "CHANGE-ME-set-a-secure-password"
    database: app          # Database name to create
    user: ""               # Optional: create a non-root user
    password: ""           # Optional: password for non-root user
  persistence:
    enabled: true     # Set false for local dev (uses emptyDir, data lost on pod restart)
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m
  config: |
    [mysqld]
    max_connections=100
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci

# ---------------------------------------------------------------------------
# OpenTelemetry Collector
# ---------------------------------------------------------------------------
otel:
  enabled: false
  sampleRate: "1.0"   # Trace sampling rate (0.0-1.0). Reduce for production.
  collector:
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.120.0"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  # type: traefik | ingress | none
  #   traefik  — Traefik IngressRoute CRD (requires Traefik with CRDs installed)
  #   ingress  — Standard Kubernetes Ingress (works with any ingress controller)
  #   none     — No ingress; use kubectl port-forward to access services
  type: traefik

  host: ""  # Empty = match all hosts (good for local dev)

  # Traefik-specific settings (only used when type: traefik)
  traefik:
    entryPoints:
      - web
    tls: {}
    #  secretName: k8s-stack-manager-tls
    middlewares:
      stripApiPrefix: false  # Backend routes include /api prefix (/api/v1/...)
      secureHeaders: true

  # Standard Ingress settings (only used when type: ingress)
  className: ""  # e.g. "nginx", "traefik", or leave empty for cluster default
  tls: []
  #  - secretName: k8s-stack-manager-tls
  #    hosts:
  #      - k8s-stack-manager.local
  annotations: {}
  #  nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  #  nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
