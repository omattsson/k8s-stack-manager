global:
  imageRegistry: ""

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Backend
# ---------------------------------------------------------------------------
backend:
  image:
    repository: k8s-stack-manager-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8081

  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

  # Non-secret environment variables (stored in ConfigMap).
  env:
    APP_NAME: k8s-stack-manager
    GO_ENV: production
    APP_DEBUG: "false"
    SERVER_HOST: "0.0.0.0"
    SERVER_PORT: "8081"
    SERVER_READ_TIMEOUT: "10s"
    SERVER_WRITE_TIMEOUT: "0"
    SERVER_IDLE_TIMEOUT: "30s"
    SERVER_SHUTDOWN_TIMEOUT: "30s"
    LOG_LEVEL: info
    API_VERSION: v1
    API_PREFIX: /api
    RATE_LIMIT: "100"
    CORS_ALLOWED_ORIGINS: "*"
    CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
    CORS_ALLOWED_HEADERS: "Origin,Content-Type,Accept,Authorization"
    CORS_MAX_AGE: "300"
    USE_AZURE_TABLE: "true"
    USE_AZURITE: "true"
    # AZURE_TABLE_ENDPOINT is auto-set to the azurite service when azurite.enabled=true
    AZURE_TABLE_ACCOUNT_NAME: devstoreaccount1
    AZURE_TABLE_NAME: items
    SELF_REGISTRATION: "true"
    DEFAULT_BRANCH: master
    HELM_BINARY: helm
    DEPLOYMENT_TIMEOUT: "10m"
    MAX_CONCURRENT_DEPLOYS: "5"
    # OIDC (disabled by default)
    OIDC_ENABLED: "false"
    OIDC_SCOPES: "openid,profile,email"
    OIDC_ROLE_CLAIM: roles
    OIDC_AUTO_PROVISION: "true"
    OIDC_LOCAL_AUTH: "true"
    OIDC_STATE_TTL: "5m"

  # Secret environment variables (stored in Secret).
  secrets:
    JWT_SECRET: ""               # MUST be provided — minimum 16 chars
    JWT_EXPIRATION: "24h"
    ADMIN_USERNAME: admin
    ADMIN_PASSWORD: admin
    AZURE_TABLE_ACCOUNT_KEY: "Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw=="
    KUBECONFIG_ENCRYPTION_KEY: ""
    # Git providers (optional)
    AZURE_DEVOPS_PAT: ""
    GITLAB_TOKEN: ""
    # OIDC secrets (optional)
    OIDC_CLIENT_SECRET: ""

  rollout:
    strategy:
      canary:
        steps:
          - setWeight: 20
          - pause:
              duration: 30s
          - setWeight: 50
          - pause:
              duration: 30s
          - setWeight: 80
          - pause:
              duration: 30s
    analysis:
      enabled: false
      interval: 30s
      count: 5
      failureLimit: 2

  pdb:
    enabled: true
    maxUnavailable: 1
    # minAvailable: 1  # Alternative — use one or the other

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80

  serviceAccount:
    create: true
    annotations: {}

# ---------------------------------------------------------------------------
# Frontend
# ---------------------------------------------------------------------------
frontend:
  image:
    repository: k8s-stack-manager-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8080

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

  rollout:
    strategy:
      canary:
        steps:
          - setWeight: 20
          - pause:
              duration: 30s
          - setWeight: 50
          - pause:
              duration: 30s
          - setWeight: 80
          - pause:
              duration: 30s
    analysis:
      enabled: false
      interval: 30s
      count: 5
      failureLimit: 2

  pdb:
    enabled: true
    maxUnavailable: 1
    # minAvailable: 1  # Alternative — use one or the other

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80

  serviceAccount:
    create: true
    annotations: {}

# ---------------------------------------------------------------------------
# Azurite (Azure Table Storage emulator)
# ---------------------------------------------------------------------------
azurite:
  enabled: true
  image:
    repository: mcr.microsoft.com/azure-storage/azurite
    tag: "3.34.0"
    pullPolicy: IfNotPresent
  persistence:
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

# ---------------------------------------------------------------------------
# Traefik IngressRoute
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  host: ""  # Empty = match all hosts (good for local dev)
  traefik:
    entryPoints:
      - web
    tls: {}
    #  secretName: k8s-stack-manager-tls
    middlewares:
      stripApiPrefix: false  # Backend routes include /api prefix (/api/v1/...)
      secureHeaders: true
