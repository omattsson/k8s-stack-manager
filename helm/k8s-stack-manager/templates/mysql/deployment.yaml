{{- if .Values.mysql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-stack-manager.mysql.serviceName" . }}
  labels:
    {{- include "k8s-stack-manager.mysql.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "k8s-stack-manager.mysql.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate  # MySQL needs Recreate due to PVC lock
  template:
    metadata:
      labels:
        {{- include "k8s-stack-manager.mysql.selectorLabels" . | nindent 8 }}
      {{- if semverCompare "<1.30-0" .Capabilities.KubeVersion.Version }}
      annotations:
        container.apparmor.security.beta.kubernetes.io/mysql: runtime/default
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        {{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.Version }}
        seccompProfile:
          type: RuntimeDefault
        {{- end }}
      containers:
        - name: mysql
          image: "{{ .Values.mysql.image.repository }}:{{ .Values.mysql.image.tag }}"
          imagePullPolicy: {{ .Values.mysql.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            {{- if semverCompare ">=1.30-0" .Capabilities.KubeVersion.Version }}
            appArmorProfile:
              type: RuntimeDefault
            {{- end }}
            capabilities:
              drop:
                - ALL
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "k8s-stack-manager.mysql.serviceName" . }}
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: {{ .Values.mysql.auth.database | quote }}
            {{- if .Values.mysql.auth.user }}
            - name: MYSQL_USER
              value: {{ .Values.mysql.auth.user | quote }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "k8s-stack-manager.mysql.serviceName" . }}
                  key: MYSQL_PASSWORD
            {{- end }}
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -uroot -p"$MYSQL_ROOT_PASSWORD" --silent
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -uroot -p"$MYSQL_ROOT_PASSWORD" --silent
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.mysql.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            {{- if .Values.mysql.config }}
            - name: config
              mountPath: /etc/mysql/conf.d/custom.cnf
              subPath: custom.cnf
            {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "k8s-stack-manager.mysql.serviceName" . }}-data
        {{- if .Values.mysql.config }}
        - name: config
          configMap:
            name: {{ include "k8s-stack-manager.mysql.serviceName" . }}-config
        {{- end }}
{{- end }}
