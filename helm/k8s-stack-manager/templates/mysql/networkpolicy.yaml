{{- if .Values.mysql.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "k8s-stack-manager.mysql.serviceName" . }}
  labels:
    {{- include "k8s-stack-manager.mysql.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "k8s-stack-manager.mysql.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "k8s-stack-manager.backend.selectorLabels" . | nindent 14 }}
      ports:
        - port: 3306
          protocol: TCP
{{- end }}
