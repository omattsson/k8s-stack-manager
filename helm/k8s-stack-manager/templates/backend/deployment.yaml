{{- if not .Values.argoRollouts.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-stack-manager.fullname" . }}-backend
  labels:
    {{- include "k8s-stack-manager.backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicas }}
  {{- end }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "k8s-stack-manager.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8s-stack-manager.backend.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/backend/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/backend/secret.yaml") . | sha256sum }}
        {{- if .Values.hooks.enabled }}
        checksum/hooks: {{ include (print $.Template.BasePath "/backend/hooks-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if and .Values.global.appArmor.enabled (semverCompare "<1.30-0" .Capabilities.KubeVersion.Version) }}
        container.apparmor.security.beta.kubernetes.io/backend: runtime/default
        {{- end }}
        {{- if and .Values.metrics.enabled (not .Values.metrics.serviceMonitor.enabled) }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.metrics.port }}"
        prometheus.io/path: "/metrics"
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.backend.serviceAccount.create }}
      serviceAccountName: {{ include "k8s-stack-manager.fullname" . }}-backend
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        {{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.Version }}
        seccompProfile:
          type: RuntimeDefault
        {{- end }}
      terminationGracePeriodSeconds: 35
      {{- if .Values.mysql.enabled }}
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL at {{ include "k8s-stack-manager.mysql.serviceName" . }}:3306..."
              until nc -z {{ include "k8s-stack-manager.mysql.serviceName" . }} 3306; do
                echo "MySQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "MySQL is ready!"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
      {{- end }}
      containers:
        - name: backend
          image: {{ include "k8s-stack-manager.backend.image" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "k8s-stack-manager.fullname" . }}-backend
            - secretRef:
                name: {{ include "k8s-stack-manager.fullname" . }}-backend
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          startupProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: helm-cache
              mountPath: /home/nonroot/.cache/helm
            - name: helm-config
              mountPath: /home/nonroot/.config/helm
            - name: helm-data
              mountPath: /home/nonroot/.local/share/helm
            {{- if .Values.hooks.enabled }}
            - name: hooks-config
              mountPath: /etc/hooks
              readOnly: true
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            {{- if and .Values.global.appArmor.enabled (semverCompare ">=1.30-0" .Capabilities.KubeVersion.Version) }}
            appArmorProfile:
              type: RuntimeDefault
            {{- end }}
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
        - name: helm-cache
          emptyDir: {}
        - name: helm-config
          emptyDir: {}
        - name: helm-data
          emptyDir: {}
        {{- if .Values.hooks.enabled }}
        - name: hooks-config
          configMap:
            name: {{ include "k8s-stack-manager.fullname" . }}-hooks
        {{- end }}
{{- end }}
