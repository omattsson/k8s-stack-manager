apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-stack-manager.backend.serviceName" . }}
  labels:
    {{- include "k8s-stack-manager.backend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.metrics.enabled }}
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
    {{- end }}
  selector:
    {{- include "k8s-stack-manager.backend.selectorLabels" . | nindent 4 }}
