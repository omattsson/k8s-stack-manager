{{- if .Values.backend.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-stack-manager.fullname" . }}-backend
  labels:
    {{- include "k8s-stack-manager.backend.labels" . | nindent 4 }}
rules:
  # Cluster health: list nodes
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # Namespace management: create/delete stack-* namespaces, list all
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]
  # Full access to namespaced resources for Helm chart deployment.
  # Helm charts (e.g. Bitnami) create arbitrary resource types — pods,
  # deployments, services, secrets, configmaps, PDBs, RBAC, HPA, etc.
  # Rather than enumerating every possible resource, we grant broad
  # namespaced access. This is scoped by namespace (stack-* namespaces
  # are auto-created and isolated per stack instance).
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-stack-manager.fullname" . }}-backend
  labels:
    {{- include "k8s-stack-manager.backend.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8s-stack-manager.fullname" . }}-backend
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-stack-manager.fullname" . }}-backend
    namespace: {{ .Release.Namespace }}
{{- end }}
