apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-stack-manager.fullname" . }}-backend
  labels:
    {{- include "k8s-stack-manager.backend.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.backend.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if .Values.azurite.enabled }}
  AZURE_TABLE_ENDPOINT: "{{ include "k8s-stack-manager.azurite.serviceName" . }}:10002"
  {{- end }}
