apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-stack-manager.fullname" . }}-backend
  labels:
    {{- include "k8s-stack-manager.backend.labels" . | nindent 4 }}
  annotations:
    config.kubernetes.io/description: "Non-sensitive configuration only. Secrets are in the corresponding Secret resource."
data:
  {{- range $key, $value := .Values.backend.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if .Values.mysql.enabled }}
  DB_HOST: {{ include "k8s-stack-manager.mysql.serviceName" . | quote }}
  DB_PORT: "3306"
  DB_USER: {{ if .Values.mysql.auth.user }}{{ .Values.mysql.auth.user | quote }}{{ else }}"root"{{ end }}
  DB_NAME: {{ .Values.mysql.auth.database | quote }}
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "5"
  DB_CONN_MAX_LIFETIME: "5m"
  {{- end }}
  {{- if .Values.otel.enabled }}
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "{{ include "k8s-stack-manager.otel.serviceName" . }}:4317"
  OTEL_SERVICE_NAME: "k8s-stack-manager"
  OTEL_TRACE_SAMPLE_RATE: {{ .Values.otel.sampleRate | quote }}
  {{- end }}
