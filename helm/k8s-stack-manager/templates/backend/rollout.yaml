{{- if .Values.argoRollouts.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "k8s-stack-manager.fullname" . }}-backend
  labels:
    {{- include "k8s-stack-manager.backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicas }}
  {{- end }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "k8s-stack-manager.backend.selectorLabels" . | nindent 6 }}
  strategy:
    canary:
      canaryService: {{ include "k8s-stack-manager.backend.canaryService" . }}
      stableService: {{ include "k8s-stack-manager.backend.stableService" . }}
      {{- if eq .Values.ingress.type "traefik" }}
      trafficRouting:
        traefik:
          weightedTraefikServiceName: {{ include "k8s-stack-manager.fullname" . }}-backend
      {{- end }}
      {{- if .Values.backend.rollout.analysis.enabled }}
      analysis:
        templates:
          - templateName: {{ include "k8s-stack-manager.fullname" . }}-backend
        args:
          - name: service-name
            value: {{ include "k8s-stack-manager.backend.canaryService" . }}
      {{- end }}
      {{- with .Values.backend.rollout.strategy.canary.steps }}
      steps:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  template:
    metadata:
      labels:
        {{- include "k8s-stack-manager.backend.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/backend/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/backend/secret.yaml") . | sha256sum }}
        {{- if and .Values.global.appArmor.enabled (semverCompare "<1.30-0" .Capabilities.KubeVersion.Version) }}
        container.apparmor.security.beta.kubernetes.io/backend: runtime/default
        {{- end }}
    spec:
      {{- if .Values.backend.serviceAccount.create }}
      serviceAccountName: {{ include "k8s-stack-manager.fullname" . }}-backend
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        {{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.Version }}
        seccompProfile:
          type: RuntimeDefault
        {{- end }}
      terminationGracePeriodSeconds: 35
      {{- if .Values.mysql.enabled }}
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL at {{ include "k8s-stack-manager.mysql.serviceName" . }}:3306..."
              until nc -z {{ include "k8s-stack-manager.mysql.serviceName" . }} 3306; do
                echo "MySQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "MySQL is ready!"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
      {{- end }}
      containers:
        - name: backend
          image: {{ include "k8s-stack-manager.backend.image" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "k8s-stack-manager.fullname" . }}-backend
            - secretRef:
                name: {{ include "k8s-stack-manager.fullname" . }}-backend
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          startupProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: helm-cache
              mountPath: /home/nonroot/.cache/helm
            - name: helm-config
              mountPath: /home/nonroot/.config/helm
            - name: helm-data
              mountPath: /home/nonroot/.local/share/helm
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            {{- if and .Values.global.appArmor.enabled (semverCompare ">=1.30-0" .Capabilities.KubeVersion.Version) }}
            appArmorProfile:
              type: RuntimeDefault
            {{- end }}
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
        - name: helm-cache
          emptyDir: {}
        - name: helm-config
          emptyDir: {}
        - name: helm-data
          emptyDir: {}
{{- end }}
