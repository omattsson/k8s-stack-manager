apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-stack-manager.fullname" . }}-backend
  labels:
    {{- include "k8s-stack-manager.backend.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ required "backend.secrets.JWT_SECRET must be set (minimum 16 characters)" .Values.backend.secrets.JWT_SECRET | b64enc | quote }}
  {{- range $key, $value := .Values.backend.secrets }}
  {{- if and $value (ne $key "JWT_SECRET") }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.mysql.enabled }}
  DB_PASSWORD: {{ required "mysql.auth.rootPassword must be set when mysql.enabled=true" (default .Values.mysql.auth.password .Values.mysql.auth.rootPassword) | b64enc | quote }}
  {{- end }}
