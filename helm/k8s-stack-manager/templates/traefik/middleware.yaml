{{- if .Values.ingress.enabled }}
{{- if .Values.ingress.traefik.middlewares.stripApiPrefix }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "k8s-stack-manager.fullname" . }}-strip-api-prefix
  labels:
    {{- include "k8s-stack-manager.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /api
---
{{- end }}
{{- if .Values.ingress.traefik.middlewares.secureHeaders }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "k8s-stack-manager.fullname" . }}-secure-headers
  labels:
    {{- include "k8s-stack-manager.labels" . | nindent 4 }}
spec:
  headers:
    frameDeny: true
    contentTypeNosniff: true
    browserXssFilter: true
    referrerPolicy: strict-origin-when-cross-origin
    customResponseHeaders:
      X-Powered-By: ""
{{- end }}
{{- end }}
