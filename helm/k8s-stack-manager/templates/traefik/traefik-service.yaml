{{- if .Values.ingress.enabled }}
# TraefikService for backend: Argo Rollouts manages the weights during canary rollouts.
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: {{ include "k8s-stack-manager.fullname" . }}-backend
  labels:
    {{- include "k8s-stack-manager.backend.labels" . | nindent 4 }}
spec:
  weighted:
    services:
      - name: {{ include "k8s-stack-manager.backend.stableService" . }}
        port: {{ .Values.backend.port }}
        weight: 100
      - name: {{ include "k8s-stack-manager.backend.canaryService" . }}
        port: {{ .Values.backend.port }}
        weight: 0
---
# TraefikService for frontend: Argo Rollouts manages the weights during canary rollouts.
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: {{ include "k8s-stack-manager.fullname" . }}-frontend
  labels:
    {{- include "k8s-stack-manager.frontend.labels" . | nindent 4 }}
spec:
  weighted:
    services:
      - name: {{ include "k8s-stack-manager.frontend.stableService" . }}
        port: {{ .Values.frontend.port }}
        weight: 100
      - name: {{ include "k8s-stack-manager.frontend.canaryService" . }}
        port: {{ .Values.frontend.port }}
        weight: 0
{{- end }}
