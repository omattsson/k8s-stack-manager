{{- if and .Values.frontend.enabled .Values.argoRollouts.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "k8s-stack-manager.fullname" . }}-frontend
  labels:
    {{- include "k8s-stack-manager.frontend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.frontend.autoscaling.enabled }}
  replicas: {{ .Values.frontend.replicas }}
  {{- end }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "k8s-stack-manager.frontend.selectorLabels" . | nindent 6 }}
  strategy:
    canary:
      canaryService: {{ include "k8s-stack-manager.frontend.canaryService" . }}
      stableService: {{ include "k8s-stack-manager.frontend.stableService" . }}
      {{- if eq .Values.ingress.type "traefik" }}
      trafficRouting:
        traefik:
          weightedTraefikServiceName: {{ include "k8s-stack-manager.fullname" . }}-frontend
      {{- end }}
      {{- if .Values.frontend.rollout.analysis.enabled }}
      analysis:
        templates:
          - templateName: {{ include "k8s-stack-manager.fullname" . }}-frontend
        args:
          - name: service-name
            value: {{ include "k8s-stack-manager.frontend.canaryService" . }}
      {{- end }}
      {{- with .Values.frontend.rollout.strategy.canary.steps }}
      steps:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  template:
    metadata:
      labels:
        {{- include "k8s-stack-manager.frontend.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/frontend/configmap.yaml") . | sha256sum }}
        {{- if and .Values.global.appArmor.enabled (semverCompare "<1.30-0" .Capabilities.KubeVersion.Version) }}
        container.apparmor.security.beta.kubernetes.io/nginx: runtime/default
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.frontend.serviceAccount.create }}
      serviceAccountName: {{ include "k8s-stack-manager.fullname" . }}-frontend
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        {{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.Version }}
        seccompProfile:
          type: RuntimeDefault
        {{- end }}
      terminationGracePeriodSeconds: 35
      containers:
        - name: nginx
          image: {{ include "k8s-stack-manager.frontend.image" . }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5; nginx -s quit"]
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            {{- if and .Values.global.appArmor.enabled (semverCompare ">=1.30-0" .Capabilities.KubeVersion.Version) }}
            appArmorProfile:
              type: RuntimeDefault
            {{- end }}
            capabilities:
              drop:
                - ALL
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "k8s-stack-manager.fullname" . }}-frontend-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
{{- end }}
