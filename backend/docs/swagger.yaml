basePath: /
definitions:
  gitprovider.Branch:
    properties:
      is_default:
        type: boolean
      name:
        type: string
    type: object
  gitprovider.ProviderStatus:
    properties:
      available:
        type: boolean
      type:
        type: string
    type: object
  handlers.CreateAPIKeyRequest:
    properties:
      expires_at:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  handlers.CreateAPIKeyResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      name:
        type: string
      prefix:
        type: string
      raw_key:
        description: sk_<hex> — shown once, store securely
        type: string
    type: object
  handlers.CreateClusterRequest:
    properties:
      api_server_url:
        type: string
      description:
        type: string
      is_default:
        type: boolean
      kubeconfig_data:
        type: string
      kubeconfig_path:
        type: string
      max_namespaces:
        type: integer
      name:
        type: string
      region:
        type: string
    required:
    - api_server_url
    - name
    type: object
  handlers.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handlers.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  handlers.NamespaceConflictResponse:
    properties:
      error:
        type: string
      message:
        type: string
      suggestions:
        items:
          type: string
        type: array
    type: object
  handlers.OrphanedNamespaceResponse:
    properties:
      created_at:
        type: string
      helm_releases:
        items:
          type: string
        type: array
      name:
        type: string
      phase:
        type: string
      resource_counts:
        $ref: '#/definitions/k8s.ResourceCounts'
    type: object
  handlers.RegisterRequest:
    properties:
      display_name:
        type: string
      password:
        type: string
      role:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handlers.UpdateClusterRequest:
    properties:
      api_server_url:
        type: string
      description:
        type: string
      is_default:
        type: boolean
      kubeconfig_data:
        type: string
      kubeconfig_path:
        type: string
      max_namespaces:
        type: integer
      name:
        type: string
      region:
        type: string
    type: object
  handlers.addFavoriteRequest:
    properties:
      entity_id:
        type: string
      entity_type:
        type: string
    type: object
  handlers.extendTTLRequest:
    properties:
      ttl_minutes:
        type: integer
    type: object
  handlers.quickDeployRequest:
    properties:
      branch:
        type: string
      branch_overrides:
        additionalProperties:
          type: string
        type: object
      cluster_id:
        type: string
      instance_description:
        type: string
      instance_name:
        type: string
      ttl_minutes:
        type: integer
    type: object
  handlers.quickDeployResponse:
    properties:
      definition:
        $ref: '#/definitions/models.StackDefinition'
      instance:
        $ref: '#/definitions/models.StackInstance'
      log_id:
        type: string
    type: object
  health.CheckStatus:
    properties:
      message:
        type: string
      status:
        type: string
    type: object
  health.HealthStatus:
    properties:
      checks:
        additionalProperties:
          $ref: '#/definitions/health.CheckStatus'
        type: object
      status:
        type: string
      uptime:
        type: string
    type: object
  k8s.ChartStatus:
    properties:
      chart_name:
        type: string
      deployments:
        items:
          $ref: '#/definitions/k8s.DeploymentInfo'
        type: array
      pods:
        items:
          $ref: '#/definitions/k8s.PodInfo'
        type: array
      release_name:
        type: string
      services:
        items:
          $ref: '#/definitions/k8s.ServiceInfo'
        type: array
      status:
        type: string
    type: object
  k8s.DeploymentInfo:
    properties:
      available:
        type: boolean
      desired_replicas:
        type: integer
      name:
        type: string
      ready_replicas:
        type: integer
      updated_replicas:
        type: integer
    type: object
  k8s.IngressInfo:
    properties:
      host:
        type: string
      name:
        type: string
      path:
        type: string
      tls:
        type: boolean
      url:
        type: string
    type: object
  k8s.NamespaceStatus:
    properties:
      charts:
        items:
          $ref: '#/definitions/k8s.ChartStatus'
        type: array
      ingresses:
        items:
          $ref: '#/definitions/k8s.IngressInfo'
        type: array
      last_checked:
        type: string
      namespace:
        type: string
      status:
        type: string
    type: object
  k8s.PodInfo:
    properties:
      image:
        type: string
      name:
        type: string
      phase:
        type: string
      ready:
        type: boolean
      restart_count:
        type: integer
    type: object
  k8s.ResourceCounts:
    properties:
      deployments:
        type: integer
      pods:
        type: integer
      services:
        type: integer
    type: object
  k8s.ServiceInfo:
    properties:
      cluster_ip:
        type: string
      external_ip:
        type: string
      ingress_hosts:
        items:
          type: string
        type: array
      name:
        type: string
      node_ports:
        items:
          type: integer
        type: array
      type:
        type: string
    type: object
  models.APIKey:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      last_used_at:
        type: string
      name:
        type: string
      prefix:
        description: first 16 chars of raw key for display
        type: string
      user_id:
        type: string
    type: object
  models.AuditLog:
    properties:
      action:
        type: string
      details:
        type: string
      entity_id:
        type: string
      entity_type:
        type: string
      id:
        type: string
      timestamp:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  models.ChartBranchOverride:
    properties:
      branch:
        type: string
      chart_config_id:
        type: string
      id:
        type: string
      stack_instance_id:
        type: string
      updated_at:
        type: string
    type: object
  models.ChartConfig:
    properties:
      chart_name:
        type: string
      chart_path:
        type: string
      chart_version:
        type: string
      created_at:
        type: string
      default_values:
        type: string
      deploy_order:
        type: integer
      id:
        type: string
      repository_url:
        type: string
      source_repo_url:
        type: string
      stack_definition_id:
        type: string
    type: object
  models.Cluster:
    properties:
      api_server_url:
        type: string
      created_at:
        type: string
      description:
        type: string
      health_status:
        type: string
      id:
        type: string
      is_default:
        type: boolean
      max_namespaces:
        type: integer
      name:
        type: string
      region:
        type: string
      updated_at:
        type: string
    type: object
  models.DeploymentLog:
    properties:
      action:
        description: '"deploy", "stop", or "clean"'
        type: string
      completed_at:
        type: string
      error_message:
        type: string
      id:
        type: string
      output:
        type: string
      stack_instance_id:
        type: string
      started_at:
        type: string
      status:
        description: '"running", "success", "error"'
        type: string
    type: object
  models.Item:
    properties:
      created_at:
        example: "2025-06-02T10:00:00Z"
        type: string
      deleted_at:
        format: date-time
        type: string
      id:
        example: 1
        type: integer
      name:
        type: string
      price:
        type: number
      updated_at:
        example: "2025-06-02T10:00:00Z"
        type: string
      version:
        description: For optimistic locking (1 = initial; 0 = not provided)
        type: integer
    type: object
  models.PaginatedAuditLogs:
    properties:
      data:
        items:
          $ref: '#/definitions/models.AuditLog'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  models.StackDefinition:
    properties:
      created_at:
        type: string
      default_branch:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
      source_template_id:
        type: string
      source_template_version:
        type: string
      updated_at:
        type: string
    type: object
  models.StackInstance:
    properties:
      branch:
        type: string
      cluster_id:
        type: string
      created_at:
        type: string
      error_message:
        type: string
      expires_at:
        type: string
      id:
        type: string
      last_deployed_at:
        type: string
      name:
        type: string
      namespace:
        type: string
      owner_id:
        type: string
      stack_definition_id:
        type: string
      status:
        type: string
      ttl_minutes:
        type: integer
      updated_at:
        type: string
    type: object
  models.StackTemplate:
    properties:
      category:
        type: string
      created_at:
        type: string
      default_branch:
        type: string
      description:
        type: string
      id:
        type: string
      is_published:
        type: boolean
      name:
        type: string
      owner_id:
        type: string
      updated_at:
        type: string
      version:
        type: string
    type: object
  models.TemplateChartConfig:
    properties:
      chart_name:
        type: string
      chart_path:
        type: string
      chart_version:
        type: string
      created_at:
        type: string
      default_values:
        type: string
      deploy_order:
        type: integer
      id:
        type: string
      locked_values:
        type: string
      repository_url:
        type: string
      required:
        type: boolean
      source_repo_url:
        type: string
      stack_template_id:
        type: string
    type: object
  models.User:
    properties:
      created_at:
        type: string
      display_name:
        type: string
      id:
        type: string
      role:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  models.UserFavorite:
    properties:
      created_at:
        type: string
      entity_id:
        type: string
      entity_type:
        type: string
      id:
        type: string
      user_id:
        type: string
    type: object
  models.ValueOverride:
    properties:
      chart_config_id:
        type: string
      id:
        type: string
      stack_instance_id:
        type: string
      updated_at:
        type: string
      values:
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: This is the API documentation for the backend service
  title: Backend API
  version: "1.0"
paths:
  /api/v1/admin/orphaned-namespaces:
    get:
      description: Lists all Kubernetes namespaces matching the stack-* pattern that
        have no corresponding stack instance in the database. Pass ?details=true to
        include resource counts and helm releases per namespace (expensive).
      parameters:
      - description: Include resource counts and helm releases (true/false)
        in: query
        name: details
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.OrphanedNamespaceResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List orphaned namespaces
      tags:
      - Admin
  /api/v1/admin/orphaned-namespaces/{namespace}:
    delete:
      description: Verifies the namespace is orphaned, uninstalls all Helm releases,
        and deletes the Kubernetes namespace
      parameters:
      - description: Namespace name
        in: path
        name: namespace
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete an orphaned namespace
      tags:
      - Admin
  /api/v1/audit-logs:
    get:
      description: List audit logs with optional filters and pagination
      parameters:
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: Filter by entity type
        in: query
        name: entity_type
        type: string
      - description: Filter by entity ID
        in: query
        name: entity_id
        type: string
      - description: Filter by action
        in: query
        name: action
        type: string
      - description: Start date (RFC3339)
        in: query
        name: start_date
        type: string
      - description: End date (RFC3339)
        in: query
        name: end_date
        type: string
      - description: Page size (default 25)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.PaginatedAuditLogs'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List audit logs
      tags:
      - audit-logs
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with username and password, returns a JWT token
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User login
      tags:
      - auth
  /api/v1/auth/me:
    get:
      description: Returns the authenticated user's information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get current user
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account (admin only, or when self-registration
        is enabled)
      parameters:
      - description: User registration data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /api/v1/clusters:
    get:
      description: Returns all registered clusters. Kubeconfig data is never included
        in responses.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Cluster'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all clusters
      tags:
      - clusters
    post:
      consumes:
      - application/json
      description: Registers a new Kubernetes cluster with the provided kubeconfig
        data.
      parameters:
      - description: Cluster registration payload
        in: body
        name: cluster
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateClusterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Cluster'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Register a new cluster
      tags:
      - clusters
  /api/v1/clusters/{id}:
    delete:
      description: Removes a cluster registration. Blocked if any stack instances
        reference this cluster.
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a cluster
      tags:
      - clusters
    get:
      description: Returns a single cluster by ID. Kubeconfig data is never included.
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Cluster'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get cluster details
      tags:
      - clusters
    put:
      consumes:
      - application/json
      description: Updates cluster metadata and/or kubeconfig. If kubeconfig is updated,
        the cached client is invalidated.
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      - description: Cluster update payload
        in: body
        name: cluster
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateClusterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Cluster'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a cluster
      tags:
      - clusters
  /api/v1/clusters/{id}/default:
    post:
      description: Sets the specified cluster as the default cluster for deployments.
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Set a cluster as the default
      tags:
      - clusters
  /api/v1/clusters/{id}/test:
    post:
      description: Tests connectivity to a cluster by attempting to reach the Kubernetes
        API server.
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Bad Gateway
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Test cluster connectivity
      tags:
      - clusters
  /api/v1/favorites:
    get:
      description: Returns all favorited entities for the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.UserFavorite'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List favorites for the authenticated user
      tags:
      - favorites
    post:
      consumes:
      - application/json
      description: Add an entity to the user's favorites (idempotent)
      parameters:
      - description: Favorite entity reference
        in: body
        name: favorite
        required: true
        schema:
          $ref: '#/definitions/handlers.addFavoriteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.UserFavorite'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Add a favorite
      tags:
      - favorites
  /api/v1/favorites/{entityType}/{entityId}:
    delete:
      description: Remove an entity from the user's favorites
      parameters:
      - description: Entity type (definition, instance, template)
        in: path
        name: entityType
        required: true
        type: string
      - description: Entity ID
        in: path
        name: entityId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Favorite removed
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
