host: localhost:8081
info:
  contact: {}
  description: This is the API documentation for the backend service
  title: Backend API
  version: "1.0"
paths:
  /api/v1/admin/cleanup-policies:
    get:
      description: Returns all cleanup policies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.CleanupPolicy'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all cleanup policies
      tags:
      - cleanup-policies
    post:
      consumes:
      - application/json
      description: Creates a new cleanup policy and reloads the scheduler
      parameters:
      - description: Cleanup policy
        in: body
        name: policy
        required: true
        schema:
          $ref: '#/definitions/models.CleanupPolicy'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.CleanupPolicy'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a cleanup policy
      tags:
      - cleanup-policies
  /api/v1/admin/cleanup-policies/{id}:
    delete:
      description: Deletes a cleanup policy and reloads the scheduler
      parameters:
      - description: Policy ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a cleanup policy
      tags:
      - cleanup-policies
    put:
      consumes:
      - application/json
      description: Updates an existing cleanup policy and reloads the scheduler
      parameters:
      - description: Policy ID
        in: path
        name: id
        required: true
        type: string
      - description: Cleanup policy
        in: body
        name: policy
        required: true
        schema:
          $ref: '#/definitions/models.CleanupPolicy'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.CleanupPolicy'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a cleanup policy
      tags:
      - cleanup-policies
  /api/v1/admin/cleanup-policies/{id}/run:
    post:
      description: Executes a cleanup policy immediately. Use ?dry_run=true to preview
        matches without acting.
      parameters:
      - description: Policy ID
        in: path
        name: id
        required: true
        type: string
      - description: Dry run mode
        in: query
        name: dry_run
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/scheduler.CleanupResult'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Run a cleanup policy manually
      tags:
      - cleanup-policies
  /api/v1/admin/orphaned-namespaces:
    get:
      description: Lists all Kubernetes namespaces matching the stack-* pattern that
        have no corresponding stack instance in the database. Pass ?details=true to
        include resource counts and helm releases per namespace (expensive).
      parameters:
      - description: Include resource counts and helm releases (true/false)
        in: query
        name: details
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.OrphanedNamespaceResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List orphaned namespaces
      tags:
      - Admin
  /api/v1/admin/orphaned-namespaces/{namespace}:
    delete:
      description: Verifies the namespace is orphaned, uninstalls all Helm releases,
        and deletes the Kubernetes namespace
      parameters:
      - description: Namespace name
        in: path
        name: namespace
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete an orphaned namespace
      tags:
      - Admin
  /api/v1/analytics/overview:
    get:
      description: Returns high-level aggregate counts (templates, definitions, instances,
        deploys, users)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.OverviewStats'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get platform overview statistics
      tags:
      - analytics
  /api/v1/analytics/templates:
    get:
      description: Returns usage analytics for each template including definition
        count, instance count, deploy counts, and success rate
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.TemplateStats'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get per-template usage statistics
      tags:
      - analytics
  /api/v1/analytics/users:
    get:
      description: Returns usage analytics per user including instance count, deploy
        count, and last active time (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.UserStats'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get per-user usage statistics
      tags:
      - analytics
  /api/v1/audit-logs:
    get:
      description: List audit logs with optional filters and pagination. Supports
        cursor-based pagination for efficient large dataset traversal.
      parameters:
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: Filter by entity type
        in: query
        name: entity_type
        type: string
      - description: Filter by entity ID
        in: query
        name: entity_id
        type: string
      - description: Filter by action
        in: query
        name: action
        type: string
      - description: Start date (RFC3339)
        in: query
        name: start_date
        type: string
      - description: End date (RFC3339)
        in: query
        name: end_date
        type: string
      - description: Page size (default 25)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      - description: Cursor from previous page for cursor-based pagination (overrides
          offset)
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.PaginatedAuditLogs'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List audit logs
      tags:
      - audit-logs
  /api/v1/audit-logs/export:
    get:
      description: Export audit logs as CSV or JSON file download
      parameters:
      - description: 'Export format: csv or json (default: json)'
        in: query
        name: format
        type: string
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: Filter by entity type
        in: query
        name: entity_type
        type: string
      - description: Filter by entity ID
        in: query
        name: entity_id
        type: string
      - description: Filter by action
        in: query
        name: action
        type: string
      - description: Start date (RFC3339)
        in: query
        name: start_date
        type: string
      - description: End date (RFC3339)
        in: query
        name: end_date
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Export audit logs
      tags:
      - audit-logs
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with username and password, returns a JWT access token
        and sets a refresh token cookie
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User login
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes the current refresh token and blocklists the access token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout
      tags:
      - auth
  /api/v1/auth/logout-all:
    post:
      consumes:
      - application/json
      description: Revokes all refresh tokens for the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout from all sessions
      tags:
      - auth
  /api/v1/auth/me:
    get:
      description: Returns the authenticated user's information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get current user
      tags:
      - auth
  /api/v1/auth/oidc/authorize:
    get:
      description: Generates PKCE parameters and state, returns the IdP authorization
        URL for the frontend to redirect to
      parameters:
      - description: Frontend URL to return to after authentication
        in: query
        name: redirect
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Start OIDC authorization flow
      tags:
      - auth
  /api/v1/auth/oidc/callback:
    get:
      description: Handles the IdP callback after user authentication. Exchanges the
        authorization code for tokens, provisions or updates the local user, and redirects
        to the frontend with a JWT.
      parameters:
      - description: Authorization code from IdP
        in: query
        name: code
        required: true
        type: string
      - description: State parameter for CSRF validation
        in: query
        name: state
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: CLI auth success page (HTML)
          schema:
            type: string
        "302":
          description: Redirect to login with error
          schema:
            type: string
        "410":
          description: CLI session expired (HTML)
          schema:
            type: string
        "500":
          description: Internal error (HTML, CLI flow only)
          schema:
            type: string
      summary: OIDC callback
      tags:
      - auth
  /api/v1/auth/oidc/cli-auth:
    post:
      description: Generates a session ID and OIDC authorization URL for CLI-based
        SSO login. The CLI opens the returned login_url in a browser and polls cli-token
        until authentication completes.
      produces:
      - application/json
      responses:
        "200":
          description: session_id, login_url, expires_in
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Start CLI SSO authentication flow
      tags:
      - auth
  /api/v1/auth/oidc/cli-token:
    post:
      consumes:
      - application/json
      description: Returns the current status of a CLI auth session. Returns pending
        while waiting for the user to complete browser authentication, or completed
        with a JWT token once done.
      parameters:
      - description: CLI token poll request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CLITokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: status, token (when completed), username, user_id
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "410":
          description: session expired or not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Poll CLI SSO authentication status
      tags:
      - auth
  /api/v1/auth/oidc/config:
    get:
      description: Returns public OIDC configuration for the frontend (enabled status,
        provider name, local auth availability)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get OIDC configuration
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Issues a new access token using the refresh token cookie. Rotates
        the refresh token (old one invalidated, new one issued).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.RefreshResponse'
        "401":
          description: Invalid, expired, or revoked refresh token
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Refresh tokens not enabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh access token
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account (admin only, or when self-registration
        is enabled)
      parameters:
      - description: User registration data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /api/v1/clusters:
    get:
      description: Returns all registered clusters. Kubeconfig data is never included
        in responses. Admin/DevOps users receive full cluster details; other roles
        receive a summary (id, name, is_default only).
      produces:
      - application/json
      responses:
        "200":
          description: Summary (other roles)
          schema:
            items:
              $ref: '#/definitions/handlers.ClusterSummary'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all clusters
      tags:
      - clusters
