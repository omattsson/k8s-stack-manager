name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  trivy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy on backend filesystem
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: backend
          format: sarif
          output: trivy-backend.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload backend Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  trivy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy on frontend filesystem
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: frontend
          format: sarif
          output: trivy-frontend.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload frontend Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  trivy-helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy on Helm chart (config mode)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: config
          scan-ref: helm/k8s-stack-manager
          format: sarif
          output: trivy-helm.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Helm Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-helm.sarif
          category: trivy-helm
