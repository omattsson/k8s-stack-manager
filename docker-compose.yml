services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${GO_ENV:-production}
    container_name: app-backend-${GO_ENV:-prod}
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    environment:
      - APP_NAME=${APP_NAME:-application}
      - APP_ENV=${GO_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8081
      - SERVER_READ_TIMEOUT=${SERVER_READ_TIMEOUT:-15s}
      - SERVER_WRITE_TIMEOUT=${SERVER_WRITE_TIMEOUT:-15s}
      - SERVER_SHUTDOWN_TIMEOUT=${SERVER_SHUTDOWN_TIMEOUT:-30s}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-}
      - API_VERSION=${API_VERSION:-v1}
      - API_PREFIX=${API_PREFIX:-/api}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - CORS_ALLOWED_METHODS=${CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
      - CORS_ALLOWED_HEADERS=${CORS_ALLOWED_HEADERS:-Origin,Content-Type,Accept,Authorization}
      - CORS_MAX_AGE=${CORS_MAX_AGE:-300}
      # Auth
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production-minimum-16-chars}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - SELF_REGISTRATION=${SELF_REGISTRATION:-true}
      # OIDC / External Auth (optional)
      - OIDC_ENABLED=${OIDC_ENABLED:-false}
      - OIDC_PROVIDER_URL=${OIDC_PROVIDER_URL:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URL=${OIDC_REDIRECT_URL:-}
      - OIDC_SCOPES=${OIDC_SCOPES:-openid,profile,email}
      - OIDC_ROLE_CLAIM=${OIDC_ROLE_CLAIM:-roles}
      - OIDC_ADMIN_ROLES=${OIDC_ADMIN_ROLES:-}
      - OIDC_DEVOPS_ROLES=${OIDC_DEVOPS_ROLES:-}
      - OIDC_AUTO_PROVISION=${OIDC_AUTO_PROVISION:-true}
      - OIDC_LOCAL_AUTH=${OIDC_LOCAL_AUTH:-true}
      - OIDC_STATE_TTL=${OIDC_STATE_TTL:-5m}
      # MySQL
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=3306
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-rootpassword}
      - DB_NAME=${DB_NAME:-app}
      - DB_MAX_OPEN_CONNS=${DB_MAX_OPEN_CONNS:-25}
      - DB_MAX_IDLE_CONNS=${DB_MAX_IDLE_CONNS:-5}
      - DB_CONN_MAX_LIFETIME=${DB_CONN_MAX_LIFETIME:-5m}

      # Git providers (optional - leave empty for local dev)
      - AZURE_DEVOPS_PAT=${AZURE_DEVOPS_PAT:-}
      - AZURE_DEVOPS_DEFAULT_ORG=${AZURE_DEVOPS_DEFAULT_ORG:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      - GITLAB_BASE_URL=${GITLAB_BASE_URL:-https://gitlab.com}
      # Deployment
      - HELM_BINARY=${HELM_BINARY:-helm}
      - KUBECONFIG_PATH=${KUBECONFIG_PATH:-}
      - DEPLOYMENT_TIMEOUT=${DEPLOYMENT_TIMEOUT:-10m}
      - MAX_CONCURRENT_DEPLOYS=${MAX_CONCURRENT_DEPLOYS:-5}
      # OpenTelemetry (requires --profile otel)
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-k8s-stack-manager}
      - OTEL_TRACE_SAMPLE_RATE=${OTEL_TRACE_SAMPLE_RATE:-1.0}
      # Rate limiting (req/min per IP; override with RATE_LIMIT / LOGIN_RATE_LIMIT env vars)
      - RATE_LIMIT=${RATE_LIMIT:-100}
      - LOGIN_RATE_LIMIT=${LOGIN_RATE_LIMIT:-10}
      # Swagger UI (enabled for dev)
      - ENABLE_SWAGGER=${ENABLE_SWAGGER:-true}
      # Session store (token blocklist + OIDC state persistence)
      - SESSION_STORE=${SESSION_STORE:-mysql}
      # Stack defaults
      - DEFAULT_BRANCH=${DEFAULT_BRANCH:-master}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net
    volumes:
      - ./backend:/app
      - backend_go_mod:/go/pkg/mod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${NODE_ENV:-production}
      args:
        - NODE_ENV=${NODE_ENV:-production}
    container_name: app-frontend-${NODE_ENV:-prod}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8081}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend-net
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

  mysql:
    image: mysql:8.4.4
    container_name: app-mysql-${GO_ENV:-dev}
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${DB_NAME:-app}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/config/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend-net

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: app-mysqld-exporter
    profiles: [mysql-otel]
    environment:
      - MYSQLD_EXPORTER_PASSWORD=${DB_PASSWORD:-rootpassword}
    command:
      - "--mysqld.address=mysql:3306"
      - "--mysqld.username=root"
    ports:
      - "127.0.0.1:9104:9104"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9104/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - backend-net

  # -- OpenTelemetry (profile: otel) ----------------------------------------
  # Start with: docker compose --profile otel up
  # Or use:     make dev-otel

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: app-otel-collector
    profiles: [otel]
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC (localhost only)
      - "127.0.0.1:4318:4318"   # OTLP HTTP (localhost only)
    volumes:
      - ./config/otel/collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config", "/etc/otelcol-contrib/config.yaml"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - backend-net

  tempo:
    image: grafana/tempo:2.7.2
    container_name: app-tempo
    profiles: [otel]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./config/otel/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"   # Tempo HTTP API (localhost only)
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend-net

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: app-prometheus
    profiles: [otel]
    ports:
      - "9090:9090"   # Prometheus UI
    volumes:
      - ./config/otel/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend-net

  grafana:
    image: grafana/grafana:12.3.1
    container_name: app-grafana
    profiles: [otel]
    ports:
      - "3001:3000"    # Grafana UI (3001 to avoid clash with frontend :3000)
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_METRICS_ENABLED=true
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./config/otel/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend-net

volumes:
  backend_go_mod:
  frontend_node_modules:
  mysql_data: {}
  grafana_data: {}
  tempo_data: {}

networks:
  backend-net:
    name: backend-network-${GO_ENV:-prod}
  frontend-net:
    name: frontend-network-${NODE_ENV:-prod}
