services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${GO_ENV:-production}
    container_name: app-backend-${GO_ENV:-prod}
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    environment:
      - APP_NAME=${APP_NAME:-application}
      - APP_ENV=${GO_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8081
      - SERVER_READ_TIMEOUT=${SERVER_READ_TIMEOUT:-15s}
      - SERVER_WRITE_TIMEOUT=${SERVER_WRITE_TIMEOUT:-15s}
      - SERVER_SHUTDOWN_TIMEOUT=${SERVER_SHUTDOWN_TIMEOUT:-30s}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-}
      - API_VERSION=${API_VERSION:-v1}
      - API_PREFIX=${API_PREFIX:-/api}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - CORS_ALLOWED_METHODS=${CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
      - CORS_ALLOWED_HEADERS=${CORS_ALLOWED_HEADERS:-Origin,Content-Type,Accept,Authorization}
      - CORS_MAX_AGE=${CORS_MAX_AGE:-300}
      # Auth
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production-minimum-16-chars}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - SELF_REGISTRATION=${SELF_REGISTRATION:-true}
      # OIDC / External Auth (optional)
      - OIDC_ENABLED=${OIDC_ENABLED:-false}
      - OIDC_PROVIDER_URL=${OIDC_PROVIDER_URL:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URL=${OIDC_REDIRECT_URL:-}
      - OIDC_SCOPES=${OIDC_SCOPES:-openid,profile,email}
      - OIDC_ROLE_CLAIM=${OIDC_ROLE_CLAIM:-roles}
      - OIDC_ADMIN_ROLES=${OIDC_ADMIN_ROLES:-}
      - OIDC_DEVOPS_ROLES=${OIDC_DEVOPS_ROLES:-}
      - OIDC_AUTO_PROVISION=${OIDC_AUTO_PROVISION:-true}
      - OIDC_LOCAL_AUTH=${OIDC_LOCAL_AUTH:-true}
      - OIDC_STATE_TTL=${OIDC_STATE_TTL:-5m}
      # Azure Table Storage (Azurite for local dev)
      - USE_AZURE_TABLE=${USE_AZURE_TABLE:-true}
      - USE_AZURITE=${USE_AZURITE:-true}
      - AZURE_TABLE_ACCOUNT_NAME=${AZURE_TABLE_ACCOUNT_NAME:-devstoreaccount1}
      - AZURE_TABLE_ACCOUNT_KEY=${AZURE_TABLE_ACCOUNT_KEY:-Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==}
      - AZURE_TABLE_ENDPOINT=${AZURE_TABLE_ENDPOINT:-azurite:10002}
      - AZURE_TABLE_NAME=${AZURE_TABLE_NAME:-items}
      # Git providers (optional - leave empty for local dev)
      - AZURE_DEVOPS_PAT=${AZURE_DEVOPS_PAT:-}
      - AZURE_DEVOPS_DEFAULT_ORG=${AZURE_DEVOPS_DEFAULT_ORG:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      - GITLAB_BASE_URL=${GITLAB_BASE_URL:-https://gitlab.com}
      # Deployment
      - HELM_BINARY=${HELM_BINARY:-helm}
      - KUBECONFIG_PATH=${KUBECONFIG_PATH:-}
      - DEPLOYMENT_TIMEOUT=${DEPLOYMENT_TIMEOUT:-10m}
      - MAX_CONCURRENT_DEPLOYS=${MAX_CONCURRENT_DEPLOYS:-5}
      # Stack defaults
      - DEFAULT_BRANCH=${DEFAULT_BRANCH:-master}
    depends_on:
      azurite:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend-net
      - frontend-net
    volumes:
      - ./backend:/app
      - backend_go_mod:/go/pkg/mod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${NODE_ENV:-production}
      args:
        - NODE_ENV=${NODE_ENV:-production}
    container_name: app-frontend-${NODE_ENV:-prod}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8081}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend-net
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.34.0
    container_name: app-azurite-${GO_ENV:-dev}
    ports:
      - "10000:10000"  # Blob
      - "10001:10001"  # Queue
      - "10002:10002"  # Table
    volumes:
      - azurite_data:/data
    command: azurite --tableHost 0.0.0.0 --blobHost 0.0.0.0 --queueHost 0.0.0.0 --silent
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').createConnection(10002,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend-net

  # -- OpenTelemetry (profile: otel) ----------------------------------------
  # Start with: docker compose --profile otel up
  # Or use:     make dev-otel

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: app-otel-collector
    profiles: [otel]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./config/otel/collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:13133/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend-net

  jaeger:
    image: jaegertracing/jaeger:2.6
    container_name: app-jaeger
    profiles: [otel]
    ports:
      - "16686:16686"  # Jaeger UI
    environment:
      - COLLECTOR_OTLP_GRPC_HOST_PORT=0.0.0.0:4317
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:16686/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend-net

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: app-prometheus
    profiles: [otel]
    ports:
      - "9090:9090"   # Prometheus UI
    volumes:
      - ./config/otel/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend-net

  grafana:
    image: grafana/grafana:12.4.2
    container_name: app-grafana
    profiles: [otel]
    ports:
      - "3001:3000"    # Grafana UI (3001 to avoid clash with frontend :3000)
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./config/otel/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend-net

volumes:
  backend_go_mod:
  frontend_node_modules:
  azurite_data: {}
  grafana_data: {}

networks:
  backend-net:
    name: backend-network-${GO_ENV:-prod}
  frontend-net:
    name: frontend-network-${NODE_ENV:-prod}
