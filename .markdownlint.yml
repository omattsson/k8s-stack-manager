# Relaxed markdown lint configuration
default: true

# MD013 - Line length (disabled - many docs have long lines)
MD013: false

# MD024 - Multiple headings with the same content (disabled - common in changelogs)
MD024: false

# MD033 - Inline HTML (disabled - used in READMEs for badges, images)
MD033: false

# MD041 - First line should be a top-level heading (disabled - some files start with frontmatter or badges)
MD041: false

# MD034 - Bare URLs (disabled - common in docs)
MD034: false

# MD040 - Fenced code blocks should have a language specified
MD040: false

# MD036 - Emphasis used instead of a heading
MD036: false

# MD046 - Code block style
MD046: false

# MD047 - Files should end with a single newline character
MD047: false
